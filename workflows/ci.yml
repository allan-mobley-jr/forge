name: CI
on:
  pull_request:
    branches: [main]
jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: TypeCheck
        run: pnpm tsc --noEmit
      - name: Build
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: true
